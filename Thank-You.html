<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subscription Confirmed</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: - 'Poppins', sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .page {
    text-align: center;
    padding: 3rem 2rem;
    max-width: 700px;
    width: 100%;
    z-index: 1;
  }

  .checkmark {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #f0faf4;
    border: 2px solid #34c768;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.75rem;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  .checkmark svg {
    width: 32px;
    height: 32px;
    stroke: #34c768;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: drawCheck 0.4s 0.4s ease forwards;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  h1 {
    font-size: 3rem;
    font-weight: 800;
    color: #111;
    line-height: 1;
    margin-bottom: 1.1rem;
    animation: fadeUp 0.5s 0.3s ease both;
  }

  p {
    font-size: 26px;
    color: #A9A9A9;
    line-height: 1.75;
    animation: fadeUp 0.5s 0.45s ease both;
  }

  .illustration {
    margin: 2.25rem auto 0;
    width: 160px;
    animation: fadeUp 0.5s 0.6s ease both;
  }

  .illustration svg {
    width: 100%;
    height: auto;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="page">
  <div class="checkmark">
    <svg viewBox="0 0 24 24"><polyline points="4 13 9 18 20 7"/></svg>
  </div>

  <h1>You're One Step Closer<br>to Better Mornings</h1>

  <p>
    We've received your subscription request. Our team will review your
    location and confirm availability, then reach out shortly to get you
    started.
  </p>

  <!-- Simple sitting-person illustration using inline SVG -->
  <div class="illustration">
    <svg viewBox="0 0 160 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Desk -->
      <rect x="20" y="88" width="120" height="6" rx="3" fill="#e0dbd2"/>
      <rect x="28" y="94" width="6" height="28" rx="3" fill="#c8c2b8"/>
      <rect x="126" y="94" width="6" height="28" rx="3" fill="#c8c2b8"/>
      <!-- Laptop base -->
      <rect x="52" y="72" width="56" height="18" rx="4" fill="#d0ccc5"/>
      <!-- Laptop screen -->
      <rect x="55" y="40" width="50" height="34" rx="4" fill="#2d2d2d"/>
      <rect x="58" y="43" width="44" height="28" rx="2" fill="#4a90d9"/>
      <!-- Screen content lines -->
      <rect x="62" y="48" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
      <rect x="62" y="54" width="32" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
      <rect x="62" y="59" width="26" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
      <!-- Person body -->
      <rect x="88" y="62" width="22" height="28" rx="6" fill="#f4a261"/>
      <!-- Person head -->
      <circle cx="99" cy="52" r="12" fill="#f4a261"/>
      <!-- Hair -->
      <path d="M88 50 Q90 38 99 37 Q108 38 110 50 Q106 44 99 44 Q92 44 88 50Z" fill="#2d1b00"/>
      <!-- Paper plane flying -->
      <g transform="translate(112, 28) rotate(-20)">
        <path d="M0 0 L18 8 L0 16 L4 8 Z" fill="#e63946"/>
        <path d="M4 8 L18 8" stroke="#fff" stroke-width="1" opacity="0.5"/>
      </g>
      <!-- Arm reaching to laptop -->
      <path d="M96 76 Q90 80 76 82" stroke="#f4a261" stroke-width="7" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const colors = ['#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a','#264653','#a8dadc','#f1faee'];
  const pieces = [];
  const count = 160;

  for (let i = 0; i < count; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      w: 8 + Math.random() * 8,
      h: 5 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.12,
      speedY: 2 + Math.random() * 3.5,
      speedX: (Math.random() - 0.5) * 2,
      opacity: 1
    });
  }

  let frame = 0;
  const maxFrames = 280;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    pieces.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.rot += p.rotSpeed;
      if (frame > maxFrames * 0.6) p.opacity = Math.max(0, p.opacity - 0.012);

      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });

    if (frame < maxFrames) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  draw();
})();
</script>

</body>
</html>
